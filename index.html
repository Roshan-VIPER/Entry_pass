<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Durga ❤️</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      min-height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
      padding: 20px;
      overflow-x: hidden;
    }

    /* --- Music Player --- */
    .music-player {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(5px);
      padding: 8px 15px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
      font-size: 0.85rem;
      transition: 0.3s;
    }
    .music-player:hover { background: rgba(255, 255, 255, 0.3); }
    .disc {
      width: 24px;
      height: 24px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ff4f81;
      font-size: 12px;
      animation: rotateDisc 3s linear infinite;
      animation-play-state: paused;
    }
    @keyframes rotateDisc { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .container{
      text-align:center;
      color:white;
      padding:40px 25px;
      width:100%;
      max-width:650px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255,255,255,0.15);
      border:1px solid rgba(255,255,255,0.25);
      border-radius:30px;
      box-shadow:0 10px 40px rgba(0,0,0,0.15);
      animation: fadeIn 1.5s ease;
      z-index:2;
    }

    h1{
      font-size: 2.5rem;
      line-height: 1.3;
      margin-bottom:15px;
    }

    .name{
      color:#fff5b7;
      display: inline-block;
      text-shadow: 0 0 10px rgba(255, 245, 183, 0.3);
    }

    .typewriter-box {
      min-height: 120px;
      margin-top: 20px;
    }
    p{
      font-size:1.05rem;
      line-height:1.7;
    }

    /* --- ADD-ON: Interactive Scratch Card Stylings --- */
    .scratch-title {
      font-size: 1rem;
      color: #fff5b7;
      margin-top: 30px;
      font-weight: 600;
      letter-spacing: 1px;
    }
    
    .scratch-container {
      position: relative;
      width: 280px;
      height: 120px;
      margin: 15px auto 0 auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .scratch-reveal-text {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff5f8;
      color: #ff4f81;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 10px;
      border-radius: 15px;
      text-align: center;
    }

    .scratch-reveal-text span {
      font-size: 0.8rem;
      color: #777;
      font-weight: 400;
      margin-top: 5px;
    }

    #scratchCanvas {
      position: absolute;
      top: 0;
      left: 0;
      cursor: pointer;
      z-index: 3;
      touch-action: none; /* Prevents screen scrolling while scratching on mobile */
    }

    .heart{
      font-size:3.5rem;
      animation: pulse 1s infinite;
      margin-top:25px;
    }

    /* Button Layout adjustments */
    .btn-group {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn{
      padding:14px 28px;
      border:none;
      border-radius:40px;
      background:white;
      color:#ff4f81;
      font-size:0.95rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      box-shadow: 0 5px 15px rgba(255, 79, 129, 0.2);
    }
    .btn:hover, .btn:active {
      transform:scale(1.05);
      background:#fff5f8;
    }

    /* Special style for our secondary custom button */
    .btn-secondary {
      background: transparent;
      color: white;
      border: 2px solid white;
      box-shadow: none;
    }
    .btn-secondary:hover, .btn-secondary:active {
      background: rgba(255, 255, 255, 0.15);
      color: white;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.9rem; }
      p { font-size: 0.95rem; line-height: 1.6; }
      .container { padding: 30px 20px; }
      .music-player { top: 10px; right: 10px; padding: 6px 12px; font-size: 0.75rem; }
      .scratch-container { width: 100%; max-width: 280px; }
    }

    @keyframes pulse{ 0%, 100%{ transform:scale(1); } 50%{ transform:scale(1.1); } }
    @keyframes fadeIn{ from{ opacity:0; transform:translateY(20px); } to{ opacity:1; transform:translateY(0); } }

    .floating-heart{
      position:absolute;
      color:white;
      font-size:20px;
      animation: float 6s linear infinite;
      opacity:0.6;
      pointer-events: none;
    }
    @keyframes float{
      0%{ transform:translateY(105vh) scale(0); }
      100%{ transform:translateY(-10vh) scale(1.5); }
    }
  </style>
</head>
<body>

  <!-- Background Music Player -->
  <div class="music-player" onclick="toggleMusic()">
    <div class="disc" id="musicDisc">♪</div>
    <span id="musicStatus">Play Music ♫</span>
  </div>
  <!-- <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio> -->
  <audio id="bgMusic" loop src="96.mp3"></audio>

  <div class="container">
    <h1>Happy Birthday <span class="name">Durga (DIYA) ❤️</span></h1>

    <!-- Typewriter Box -->
    <div class="typewriter-box">
      <p id="wishText"></p>
    </div>

    <!-- NEW INTERACTIVE ADD-ON: Virtual Scratch Card -->
    <div class="scratch-title">Scratch here for your birthday gift! 🤫</div>
    <div class="scratch-container">
      <div class="scratch-reveal-text">
        🎟️ 1 Free Endless Hug Coupon!
        <span>Valid forever & non-refundable ♥</span>
      </div>
      <canvas id="scratchCanvas" width="280" height="120"></canvas>
    </div>

    <div class="heart">❤️</div>

    <!-- Interactive Button Clusters -->
    <div class="btn-group">
      <button class="btn" onclick="showMessage()">
        Click Here 💌
      </button>
      
      <!-- NEW INTERACTIVE ADD-ON: Dedicated Song Link (e.g. Spotify / YouTube link to her favorite track) -->
      <button class="btn btn-secondary" onclick="openOurSong()">
        Our Theme Song 🎵
      </button>
    </div>
  </div>

  <script>
    // 1. Typewriter Animation Logic
    const message = "Every moment with you feels special, but today is even more beautiful because it’s your day. You are the reason behind my smiles, my peace, and my happiness. I hope this year brings you endless happiness, beautiful memories, and all the love you deserve. No matter what, I’ll always be cheering for you. ✨";
    let index = 0;
    function typeEffect() {
      if (index < message.length) {
        document.getElementById("wishText").innerHTML += message.charAt(index);
        index++;
        setTimeout(typeEffect, 45);
      }
    }
    window.onload = function() {
      typeEffect();
      initScratchCard();
    };

    // 2. Music Controller Logic
    const music = document.getElementById("bgMusic");
    const disc = document.getElementById("musicDisc");
    const statusText = document.getElementById("musicStatus");

    function toggleMusic() {
      if (music.paused) {
        music.play();
        disc.style.animationPlayState = "running";
        statusText.innerText = "Playing.. ♥";
      } else {
        music.pause();
        disc.style.animationPlayState = "paused";
        statusText.innerText = "Play Music ♫";
      }
    }

    // 3. NEW ADD-ON: HTML5 Scratch Card Interactive Logic
    function initScratchCard() {
      const canvas = document.getElementById("scratchCanvas");
      const ctx = canvas.getContext("2d");
      
      // Paint the canvas with a beautiful sparkling silver/pink texture
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, '#cfd9df');
      gradient.addColorStop(1, '#e2ebf0');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Add helper text overlay on top of the scratch coating
      ctx.fillStyle = "#ff4f81";
      ctx.font = "600 14px Poppins";
      ctx.textAlign = "center";
      ctx.fillText("✨ Use finger/mouse to scratch ✨", canvas.width / 2, canvas.height / 2 + 5);

      let isDrawing = false;

      function scratch(e) {
        if (!isDrawing) return;
        
        // Handle desktop vs mobile coordinate differences accurately
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        const x = clientX - rect.left;
        const y = clientY - rect.top;

        // Use destination-out composition to transparently cut through the silver layer
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI * 2); // 20px circle brush size
        ctx.fill();
      }

      // Desktop events
      canvas.addEventListener("mousedown", () => isDrawing = true);
      canvas.addEventListener("mouseup", () => isDrawing = false);
      canvas.addEventListener("mousemove", scratch);

      // Mobile touch events
      canvas.addEventListener("touchstart", () => isDrawing = true);
      canvas.addEventListener("touchend", () => isDrawing = false);
      canvas.addEventListener("touchmove", scratch);
    }

    // 4. Redirect Link out to her theme song
    function openOurSong() {
      // Switch this URL out with a link to her favorite track or playlist
      window.open("https://open.spotify.com/playlist/6KyrUR0HOeKeKNrhuDFxNL?si=64JgvfKcRuyKlaJcQHCafA", "_blank");
    }

    // 5. Envelope Message Box
    function showMessage(){
      alert("I love you endlessly ❤️\nHappy Birthday My Love once again!");
    }

    // 6. Ambient Floating Hearts Background 
    const heartCount = 20;
    for(let i = 0; i < heartCount; i++){
      let heart = document.createElement("div");
      heart.classList.add("floating-heart");
      heart.innerHTML = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
      heart.style.animationDelay = (Math.random() * 5) + "s";
      heart.style.fontSize = (Math.random() * 15 + 12) + "px";
      document.body.appendChild(heart);
    }
  </script>
</body>
</html>
